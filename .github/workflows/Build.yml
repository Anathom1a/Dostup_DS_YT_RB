name: Build and Release Windows App

on:
  push:
    branches: [ "main" ] # Запуск при пуше в main
  workflow_dispatch: # Позволяет запускать сборку вручную из интерфейса GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' # Укажи свою версию

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable with PyInstaller
      # Замени main.py на твой главный файл. 
      # --noconsole убирает черное окно командной строки сзади UI
      run: |
        pyinstaller --noconfirm --onedir --windowed --add-data "zapret_files;zapret_files" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: ZapretUI-Build
        path: dist/main/ # Путь, куда PyInstaller сложил готовые файлы
