name: Build Dostup_YT_DS_RBLX

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd myzapretui
        pip install customtkinter requests pyinstaller

    - name: Inject Secret Salt
      env:
        SECRET_FROM_GITHUB: ${{ secrets.MY_APP_SALT }}
      run: |
        cd myzapretui
        echo "SECRET_SALT = '${env:SECRET_FROM_GITHUB}'" > config.py

    - name: Build with PyInstaller
      run: |
        $REPO_ROOT = "${{ github.workspace }}"
        cd myzapretui
        
        # Собираем:
        # 1. winws.exe из папки bin\win64
        # 2. ВСЕ .bat файлы из корня репозитория (те самые 20+ генералов)
        # 3. Всё это кладём в папку proxy_bin внутри EXE
        
        pyinstaller --noconfirm --onefile --windowed `
          --add-data "$REPO_ROOT\bin\win64\winws.exe;proxy_bin" `
          --add-data "$REPO_ROOT\*.bat;proxy_bin" `
          main.py

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Dostup-Full-Pack
        path: myzapretui/dist/main.exe
